version: 2.1

jobs:
  build:
    docker:
      - image: cimg/python:3.11

    steps:
      - checkout

      - run:
          name: Install dependencies
          command: pip install -r requirements.txt

      - run:
          name: Run linter
          command: flake8 src

      - run:
          name: Run unit tests
          command: PYTHONPATH=. pytest tests

workflows:
  version: 2
  test_pipeline:
    jobs:
      - build